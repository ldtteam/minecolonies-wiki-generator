name: Incremental Wiki Data Generation

on:
  schedule:
    - cron: '0 20 * * 0'
  workflow_dispatch:

jobs:
  update-versions:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      updated: ${{ steps.update.outputs.updated }}
      versions_json: ${{ steps.build-json.outputs.versions_json }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle wrapper cache
        uses: actions/cache@v4
        with:
          path: ~/.gradle/wrapper
          key: gradle-wrapper-${{ runner.os }}-${{ hashFiles('**/gradle-wrapper.properties') }}

      - name: Set up Gradle dependency cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/loom-cache
          key: gradle-deps-${{ runner.os }}-${{ hashFiles('**/*.gradle', '**/*.gradle.kts') }}
          restore-keys: |
            gradle-deps-${{ runner.os }}-

      - name: Grant Gradle wrapper execute permission
        run: chmod +x gradlew

      - name: Update dependency versions
        id: update
        env:
          SECRET_CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
        run: |
          ./gradlew updateDependencyVersions -Psecret_curseforge_api_key="$SECRET_CURSEFORGE_API_KEY" 2>&1 | tee /tmp/update-output.txt
          if grep -q "Dependencies were updated" /tmp/update-output.txt; then
            echo "updated=true" >> $GITHUB_OUTPUT
          else
            echo "updated=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit updated dependency versions to master
        if: steps.update.outputs.updated == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gradle.properties versions/*/gradle.properties
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: incremental wiki data generation [skip ci]"
            git push
          fi

      - name: Build versions JSON
        id: build-json
        if: steps.update.outputs.updated == 'true'
        run: |
          json="{"
          first_version=true
          for props_file in versions/*/gradle.properties; do
            version_id=$(basename $(dirname "$props_file"))
            if [ "$first_version" = true ]; then first_version=false; else json="$json,"; fi
            json="$json\"$version_id\":{"
            first_prop=true
            while IFS='=' read -r key value; do
              [[ "$key" =~ ^[[:space:]]*# ]] && continue
              [[ -z "$key" ]] && continue
              key=$(echo "$key" | xargs)
              value=$(echo "$value" | xargs)
              case "$key" in
                minecolonies_version|structurize_version|blockui_version|domum_ornamentum_version|multi_piston_version|stylecolonies_version)
                  if [ "$first_prop" = true ]; then first_prop=false; else json="$json,"; fi
                  json="$json\"$key\":\"$value\""
                  ;;
              esac
            done < "$props_file"
            json="$json}"
          done
          json="$json}"
          echo "versions_json=$json" >> $GITHUB_OUTPUT

      - name: Trigger publish generation
        if: steps.update.outputs.updated == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'publish-generation.yml',
              ref: 'master',
              inputs: {
                versions_json: '${{ steps.build-json.outputs.versions_json }}'
              }
            });